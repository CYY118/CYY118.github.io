<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>登录</title>
    <link type="text/css" rel="stylesheet" href="css/Loginstyle.css" />

</head>
<body>

<form class="loginform">
    <table class="logintable">
        <tr >
            <td style="text-align: center;" ><h3>管理员账号:</h3></td>
            <td ><input STYLE="margin-left: 60px" size="46" type="text" name="username" required></td>
        </tr>
        <tr >
            <td style="text-align: center"><h3>管理员密码:</h3></td>
            <td><input size="46" style="margin-left: 60px" type="password" name="password" required></td>
        </tr>
    </table>
    <table class="logintableone">
        <tr>
            <td><input type="submit" value="登录" id="loginsubmit"></td>
            <td><input type="submit" value="注册" id="registersubmit"></td>
            <td><input type="reset" value="重置" id="resetsubmit"></td>
        </tr>
    </table>
</form>
</body>
</html>
